name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSYS2 GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Install package and test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Validate Ku TextMate grammar JSON
        shell: bash
        run: python -m json.tool syntaxes/ku.tmLanguage.json > /tmp/ku_tm.json

      - name: Run tests
        shell: bash
        run: pytest -q
